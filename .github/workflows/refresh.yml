name: Refresh from kaikki-yoruba

on:
  schedule:
    # 3 hours after kaikki-yoruba's own weekly refresh (Monday 06:00 UTC) -
    # comfortably enough buffer for that run (a few minutes) to publish its
    # new release before this one fetches it.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Explicit, scoped to this job: the default GITHUB_TOKEN is read-only
    # unless a repo/org's default workflow permissions are set to
    # read/write - declaring it here means this workflow requests exactly
    # what it needs (contents: write, to commit the regenerated data below)
    # regardless of that default.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Rebuild from kaikki-yoruba's latest release
        run: node build/normalize.mjs

      - name: Sanity-check the rebuilt entry count
        run: |
          count=$(node -e "console.log(Object.keys(JSON.parse(require('fs').readFileSync('public/data/entries.json','utf8'))).length)")
          echo "Rebuilt with ${count} entries"
          if [ "$count" -lt 5000 ]; then
            echo "::error::Suspiciously few entries (${count}) - refusing to commit. kaikki-yoruba's own workflow already sanity-checks before publishing, so this would point at something wrong on this side instead."
            exit 1
          fi

      - name: Commit and push if the data actually changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data build/validation-report.json
          if git diff --cached --quiet; then
            echo "No changes since last refresh - nothing to commit."
            exit 0
          fi
          TAG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('build/validation-report.json','utf8')).kaikkiReleaseTag)")
          SOURCE_DATE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('build/validation-report.json','utf8')).kaikkiSourceDate)")
          git commit -m "Refresh data from kaikki-yoruba release ${TAG} (sourced ${SOURCE_DATE})"
          git push
